name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/gabrielvcg/telegram-ai-assistant

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Check SSH connectivity
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" "echo ssh-ok"

      - name: Upload compose file
        env:
          ALLOWED_USER_IDS: ${{ vars.ALLOWED_USER_IDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HISTORY_LIMIT: ${{ vars.HISTORY_LIMIT }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          MAX_TELEGRAM_MESSAGE_LENGTH: ${{ vars.MAX_TELEGRAM_MESSAGE_LENGTH }}
          MAX_TOKENS: ${{ vars.MAX_TOKENS }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
          PLAN_MAX_TOKENS: ${{ vars.PLAN_MAX_TOKENS }}
          RATE_LIMIT_MESSAGES: ${{ vars.RATE_LIMIT_MESSAGES }}
          RATE_LIMIT_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_WINDOW_SECONDS }}
          SYSTEM_PROMPT: ${{ vars.SYSTEM_PROMPT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          WORKSPACE_READ_ENABLED: ${{ vars.WORKSPACE_READ_ENABLED }}
          WORKSPACE_WRITE_ENABLED: ${{ vars.WORKSPACE_WRITE_ENABLED }}
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Attempt $attempt failed; retrying in 10 seconds..."
              sleep 10
            done
            "$@"
          }

          required_vars=(
            "ANTHROPIC_API_KEY"
            "TELEGRAM_BOT_TOKEN"
            "ALLOWED_USER_IDS"
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required production environment value: $var_name"
              exit 1
            fi
          done

          umask 077
          cat > .env.deploy << EOF
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          MODEL_NAME=${MODEL_NAME:-claude-sonnet-4-5}
          ALLOWED_USER_IDS=$ALLOWED_USER_IDS
          SYSTEM_PROMPT=${SYSTEM_PROMPT:-Eres el asistente personal de Gabriel. Responde siempre en espanol salvo que te hablen en otro idioma. Se tecnico, util y conciso.}
          DATABASE_PATH=/app/data/assistant.db
          HISTORY_LIMIT=${HISTORY_LIMIT:-12}
          MAX_TOKENS=${MAX_TOKENS:-1200}
          PLAN_MAX_TOKENS=${PLAN_MAX_TOKENS:-2200}
          MAX_TELEGRAM_MESSAGE_LENGTH=${MAX_TELEGRAM_MESSAGE_LENGTH:-3900}
          RATE_LIMIT_MESSAGES=${RATE_LIMIT_MESSAGES:-20}
          RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
          WORKSPACE_ROOT=/app/workspace
          WORKSPACE_READ_ENABLED=${WORKSPACE_READ_ENABLED:-true}
          WORKSPACE_WRITE_ENABLED=${WORKSPACE_WRITE_ENABLED:-false}
          LOG_LEVEL=${LOG_LEVEL:-INFO}
          EOF

          retry ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_PATH' '$VPS_DEPLOY_PATH/data' '$VPS_DEPLOY_PATH/workspace'"

          retry scp \
            -i ~/.ssh/deploy_key \
            -P "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/docker-compose.yml"

          retry scp \
            -i ~/.ssh/deploy_key \
            -P "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            .env.deploy \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/.env.tmp"

          retry ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" "mv '$VPS_DEPLOY_PATH/.env.tmp' '$VPS_DEPLOY_PATH/.env' && chmod 600 '$VPS_DEPLOY_PATH/.env'"

      - name: Deploy container
        env:
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Attempt $attempt failed; retrying in 10 seconds..."
              sleep 10
            done
            "$@"
          }

          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            echo "$GHCR_TOKEN" | retry ssh \
              -i ~/.ssh/deploy_key \
              -p "$VPS_PORT" \
              -o BatchMode=yes \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=3 \
              -o StrictHostKeyChecking=accept-new \
              "$VPS_USER@$VPS_HOST" \
              "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          fi

          retry ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            "VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH' IMAGE_NAME='${IMAGE_NAME}:latest' bash -s" << 'EOF'
          set -e
          cd "$VPS_DEPLOY_PATH"
          mkdir -p data workspace
          test -f .env
          IMAGE_NAME="$IMAGE_NAME" docker compose pull
          IMAGE_NAME="$IMAGE_NAME" docker compose up -d
          docker image prune -f
          EOF
