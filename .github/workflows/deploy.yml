name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/gabrielvcg/telegram-ai-assistant

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Check SSH connectivity
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" "echo ssh-ok"

      - name: Upload compose file
        env:
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Attempt $attempt failed; retrying in 10 seconds..."
              sleep 10
            done
            "$@"
          }

          retry ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_PATH'"

          retry scp \
            -i ~/.ssh/deploy_key \
            -P "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/docker-compose.yml"

      - name: Deploy container
        env:
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Attempt $attempt failed; retrying in 10 seconds..."
              sleep 10
            done
            "$@"
          }

          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            echo "$GHCR_TOKEN" | retry ssh \
              -i ~/.ssh/deploy_key \
              -p "$VPS_PORT" \
              -o BatchMode=yes \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=3 \
              -o StrictHostKeyChecking=accept-new \
              "$VPS_USER@$VPS_HOST" \
              "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          fi

          retry ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            "VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH' IMAGE_NAME='${IMAGE_NAME}:latest' bash -s" << 'EOF'
          set -e
          cd "$VPS_DEPLOY_PATH"
          mkdir -p data workspace
          test -f .env
          IMAGE_NAME="$IMAGE_NAME" docker compose pull
          IMAGE_NAME="$IMAGE_NAME" docker compose up -d
          docker image prune -f
          EOF
