name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/gabrielvcg/telegram-ai-assistant

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy bundle on VPS
        env:
          ALLOWED_USER_IDS: ${{ vars.ALLOWED_USER_IDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HISTORY_LIMIT: ${{ vars.HISTORY_LIMIT }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          MAX_TELEGRAM_MESSAGE_LENGTH: ${{ vars.MAX_TELEGRAM_MESSAGE_LENGTH }}
          MAX_TOKENS: ${{ vars.MAX_TOKENS }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
          PLAN_MAX_TOKENS: ${{ vars.PLAN_MAX_TOKENS }}
          PROJECT_TELEGRAM_BASE_BRANCH: ${{ vars.PROJECT_TELEGRAM_BASE_BRANCH }}
          PROJECT_TELEGRAM_BASE_BRANCH_SECRET: ${{ secrets.PROJECT_TELEGRAM_BASE_BRANCH }}
          PROJECT_TELEGRAM_PATH: ${{ vars.PROJECT_TELEGRAM_PATH }}
          PROJECT_TELEGRAM_PATH_SECRET: ${{ secrets.PROJECT_TELEGRAM_PATH }}
          PROJECT_TELEGRAM_REPO: ${{ vars.PROJECT_TELEGRAM_REPO }}
          PROJECT_TELEGRAM_REPO_SECRET: ${{ secrets.PROJECT_TELEGRAM_REPO }}
          PROJECT_TELEGRAM_TOKEN: ${{ secrets.PROJECT_TELEGRAM_TOKEN }}
          RATE_LIMIT_MESSAGES: ${{ vars.RATE_LIMIT_MESSAGES }}
          RATE_LIMIT_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_WINDOW_SECONDS }}
          SYSTEM_PROMPT: ${{ vars.SYSTEM_PROMPT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          WORKSPACE_READ_ENABLED: ${{ vars.WORKSPACE_READ_ENABLED }}
          WORKSPACE_COMMAND_ENABLED: ${{ vars.WORKSPACE_COMMAND_ENABLED }}
          WORKSPACE_COMMAND_TIMEOUT_SECONDS: ${{ vars.WORKSPACE_COMMAND_TIMEOUT_SECONDS }}
          WORKSPACE_AGENT_MAX_ATTEMPTS: ${{ vars.WORKSPACE_AGENT_MAX_ATTEMPTS }}
          WORKSPACE_GIT_AUTHOR_EMAIL: ${{ vars.WORKSPACE_GIT_AUTHOR_EMAIL }}
          WORKSPACE_GIT_AUTHOR_NAME: ${{ vars.WORKSPACE_GIT_AUTHOR_NAME }}
          WORKSPACE_MAX_OUTPUT_CHARS: ${{ vars.WORKSPACE_MAX_OUTPUT_CHARS }}
          WORKSPACE_WRITE_ENABLED: ${{ vars.WORKSPACE_WRITE_ENABLED }}
        run: |
          required_vars=(
            "ANTHROPIC_API_KEY"
            "TELEGRAM_BOT_TOKEN"
            "ALLOWED_USER_IDS"
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required production environment value: $var_name"
              exit 1
            fi
          done

          umask 077
          cat > .env.deploy << EOF
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          MODEL_NAME=${MODEL_NAME:-claude-sonnet-4-5}
          ALLOWED_USER_IDS=$ALLOWED_USER_IDS
          SYSTEM_PROMPT=${SYSTEM_PROMPT:-Eres el asistente personal de Gabriel. Responde siempre en espanol salvo que te hablen en otro idioma. Se tecnico, util y conciso.}
          DATABASE_PATH=/app/data/assistant.db
          HISTORY_LIMIT=${HISTORY_LIMIT:-12}
          MAX_TOKENS=${MAX_TOKENS:-1200}
          PLAN_MAX_TOKENS=${PLAN_MAX_TOKENS:-2200}
          MAX_TELEGRAM_MESSAGE_LENGTH=${MAX_TELEGRAM_MESSAGE_LENGTH:-3900}
          RATE_LIMIT_MESSAGES=${RATE_LIMIT_MESSAGES:-20}
          RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
          WORKSPACE_ROOT=/app/workspace
          WORKSPACE_READ_ENABLED=${WORKSPACE_READ_ENABLED:-true}
          WORKSPACE_WRITE_ENABLED=${WORKSPACE_WRITE_ENABLED:-true}
          WORKSPACE_COMMAND_ENABLED=${WORKSPACE_COMMAND_ENABLED:-true}
          WORKSPACE_COMMAND_TIMEOUT_SECONDS=${WORKSPACE_COMMAND_TIMEOUT_SECONDS:-120}
          WORKSPACE_MAX_OUTPUT_CHARS=${WORKSPACE_MAX_OUTPUT_CHARS:-6000}
          WORKSPACE_AGENT_MAX_ATTEMPTS=${WORKSPACE_AGENT_MAX_ATTEMPTS:-2}
          WORKSPACE_GIT_AUTHOR_NAME=${WORKSPACE_GIT_AUTHOR_NAME:-Telegram AI Assistant}
          WORKSPACE_GIT_AUTHOR_EMAIL=${WORKSPACE_GIT_AUTHOR_EMAIL:-telegram-ai-assistant@users.noreply.github.com}
          PROJECT_TELEGRAM_PATH=${PROJECT_TELEGRAM_PATH:-$PROJECT_TELEGRAM_PATH_SECRET}
          PROJECT_TELEGRAM_REPO=${PROJECT_TELEGRAM_REPO:-$PROJECT_TELEGRAM_REPO_SECRET}
          PROJECT_TELEGRAM_BASE_BRANCH=${PROJECT_TELEGRAM_BASE_BRANCH:-$PROJECT_TELEGRAM_BASE_BRANCH_SECRET}
          PROJECT_TELEGRAM_PATH=${PROJECT_TELEGRAM_PATH:-projects/telegram-ai-assistant}
          PROJECT_TELEGRAM_REPO=${PROJECT_TELEGRAM_REPO:-Gabrielvcg/telegram-api}
          PROJECT_TELEGRAM_BASE_BRANCH=${PROJECT_TELEGRAM_BASE_BRANCH:-main}
          PROJECT_TELEGRAM_TOKEN=$PROJECT_TELEGRAM_TOKEN
          LOG_LEVEL=${LOG_LEVEL:-INFO}
          EOF

          printf '%s' "$GHCR_USERNAME" > .ghcr_username
          printf '%s' "$GHCR_TOKEN" > .ghcr_token
          tar -czf .deploy-bundle.tgz docker-compose.prod.yml .env.deploy .ghcr_username .ghcr_token

          deploy_once() {
            cat .deploy-bundle.tgz | ssh \
              -i ~/.ssh/deploy_key \
              -p "$VPS_PORT" \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=6 \
              -o StrictHostKeyChecking=accept-new \
              "$VPS_USER@$VPS_HOST" "
              set -e
              mkdir -p '$VPS_DEPLOY_PATH' '$VPS_DEPLOY_PATH/data' '$VPS_DEPLOY_PATH/workspace'
              cd '$VPS_DEPLOY_PATH'
              tar -xzf -
              mv docker-compose.prod.yml docker-compose.yml
              mv .env.deploy .env
              chmod 600 .env
              if [ -s .ghcr_token ] && [ -s .ghcr_username ]; then
                cat .ghcr_token | docker login ghcr.io -u \"\$(cat .ghcr_username)\" --password-stdin
              fi
              rm -f .ghcr_token .ghcr_username
              IMAGE_NAME='${IMAGE_NAME}:latest' docker compose pull
              IMAGE_NAME='${IMAGE_NAME}:latest' docker compose up -d
              docker image prune -f
              "
          }

          retry_deploy() {
            for attempt in 1 2 3; do
              deploy_once && return 0
              echo "Attempt $attempt failed; retrying in 10 seconds..."
              sleep 10
            done
            deploy_once
          }

          retry_deploy
