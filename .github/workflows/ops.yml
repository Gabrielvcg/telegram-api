name: OpenClaw Ops

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to run"
        required: true
        default: "logs"
        type: choice
        options:
          - logs
          - debug
          - repair-session
          - restart
          - ps

jobs:
  ops:
    name: OpenClaw VPS ops
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Run operation
        env:
          OPS_ACTION: ${{ inputs.action }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          set -euo pipefail
          : "${VPS_DEPLOY_PATH:=/opt/telegram-ai-assistant}"
          : "${VPS_PORT:=22}"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=6 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            bash -s -- "$VPS_DEPLOY_PATH" "$OPS_ACTION" <<'REMOTE'
          set -eu
          deploy_path="$1"
          ops_action="$2"
          cd "$deploy_path"
          case "$ops_action" in
            logs)
              docker compose ps
              docker compose logs --tail=250 openclaw-gateway
              ;;
            debug)
              echo '=== compose ps ==='
              docker compose ps
              echo
              echo '=== recent gateway logs ==='
              docker compose logs --since=20m openclaw-gateway
              echo
              echo '=== persisted openclaw logs ==='
              docker compose exec -T openclaw-gateway sh -lc 'ls -la /tmp/openclaw /home/node/.openclaw/logs 2>/dev/null || true; for f in /tmp/openclaw/openclaw*.log /home/node/.openclaw/logs/*.log; do [ -f "$f" ] && { echo "--- $f"; tail -n 120 "$f"; }; done' || true
              echo
              echo '=== sanitized environment ==='
              if [ -f .env ]; then
                sed -E 's/^(.*(TOKEN|KEY|SECRET|PASSWORD).*)=.*/\1=***REDACTED***/' .env
              fi
              echo
              echo '=== openclaw config ==='
              if [ -f config/openclaw.json ]; then
                sed -E 's/("(botToken|token|apiKey|secret|password)"[[:space:]]*:[[:space:]]*")[^"]+/\1***REDACTED***/Ig' config/openclaw.json
              fi
              echo
              echo '=== config health ==='
              docker compose exec -T openclaw-gateway sh -lc 'for f in /home/node/.openclaw/logs/config-health.json /home/node/.openclaw/openclaw.generated.json /home/node/.openclaw/openclaw.json.last-good; do [ -f "$f" ] && { echo "--- $f"; sed -E "s/(\"(botToken|token|apiKey|secret|password)\"[[:space:]]*:[[:space:]]*\")[^\"]+/\1***REDACTED***/Ig" "$f"; }; done' || true
              echo
              echo '=== live schema/session diagnostics ==='
              docker compose exec -T openclaw-gateway sh -lc 'openclaw config schema 2>/dev/null | grep -nE "dmScope|channels.telegram|streaming|allowFrom|activation" | head -n 120 || true; openclaw channels status 2>/dev/null || true; openclaw sessions list 2>/dev/null | head -n 120 || true' || true
              echo
              echo '=== workspace/session files ==='
              docker compose exec -T openclaw-gateway sh -lc 'pwd; id; find /home/node/.openclaw -maxdepth 6 -type f | sort | tail -n 160' || true
              ;;
            repair-session)
              stamp="$(date +%Y%m%d-%H%M%S)"
              backup_dir="backups/session-repair-$stamp"
              mkdir -p "$backup_dir"
              echo "Backing up current Gabriel session state to $backup_dir"
              docker compose stop openclaw-gateway
              if [ -d config/agents/gabriel/sessions ]; then
                cp -a config/agents/gabriel/sessions "$backup_dir/gabriel-sessions"
                rm -rf config/agents/gabriel/sessions
              fi
              if [ -f config/openclaw.generated.json ]; then
                cp -a config/openclaw.generated.json "$backup_dir/openclaw.generated.json"
                rm -f config/openclaw.generated.json
              fi
              mkdir -p config/agents/gabriel/sessions
              docker compose up -d openclaw-gateway
              sleep 10
              docker compose ps
              docker compose logs --tail=160 openclaw-gateway
              ;;
            restart)
              docker compose restart openclaw-gateway
              sleep 8
              docker compose ps
              docker compose logs --tail=120 openclaw-gateway
              ;;
            ps)
              docker compose ps
              ;;
            *)
              echo "Unknown action: $ops_action"
              exit 1
              ;;
          esac
          REMOTE
