name: OpenClaw Ops

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to run"
        required: true
        default: "logs"
        type: choice
        options:
          - logs
          - debug
          - trace-session
          - repair-session
          - restart
          - ps
          - schema
          - cli-help
          - agent-test
          - agent-main-test

jobs:
  ops:
    name: OpenClaw VPS ops
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Run operation
        env:
          OPS_ACTION: ${{ inputs.action }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          set -euo pipefail
          : "${VPS_DEPLOY_PATH:=/opt/telegram-ai-assistant}"
          : "${VPS_PORT:=22}"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=6 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            bash -s -- "$VPS_DEPLOY_PATH" "$OPS_ACTION" <<'REMOTE'
          set -eu
          deploy_path="$1"
          ops_action="$2"
          cd "$deploy_path"
          case "$ops_action" in
            logs)
              docker compose ps
              docker compose logs --tail=250 openclaw-gateway
              ;;
            debug)
              echo '=== compose ps ==='
              docker compose ps
              echo
              echo '=== recent gateway logs ==='
              docker compose logs --since=20m openclaw-gateway
              echo
              echo '=== persisted openclaw logs ==='
              docker compose exec -T openclaw-gateway sh -lc 'ls -la /tmp/openclaw /home/node/.openclaw/logs 2>/dev/null || true; for f in /tmp/openclaw/openclaw*.log /home/node/.openclaw/logs/*.log; do [ -f "$f" ] && { echo "--- $f"; tail -n 120 "$f"; }; done' || true
              echo
              echo '=== sanitized environment ==='
              if [ -f .env ]; then
                sed -E 's/^(.*(TOKEN|KEY|SECRET|PASSWORD).*)=.*/\1=***REDACTED***/' .env
              fi
              echo
              echo '=== openclaw config ==='
              if [ -f config/openclaw.json ]; then
                sed -E 's/("(botToken|token|apiKey|secret|password)"[[:space:]]*:[[:space:]]*")[^"]+/\1***REDACTED***/Ig' config/openclaw.json
              fi
              echo
              echo '=== config health ==='
              docker compose exec -T openclaw-gateway sh -lc 'for f in /home/node/.openclaw/logs/config-health.json /home/node/.openclaw/openclaw.generated.json /home/node/.openclaw/openclaw.json.last-good; do [ -f "$f" ] && { echo "--- $f"; sed -E "s/(\"(botToken|token|apiKey|secret|password)\"[[:space:]]*:[[:space:]]*\")[^\"]+/\1***REDACTED***/Ig" "$f"; }; done' || true
              echo
              echo '=== live schema/session diagnostics ==='
              docker compose exec -T openclaw-gateway sh -lc 'openclaw config schema 2>/dev/null | grep -nE "dmScope|channels.telegram|streaming|allowFrom|activation" | head -n 120 || true; openclaw channels status 2>/dev/null || true; openclaw sessions list 2>/dev/null | head -n 120 || true' || true
              echo
              echo '=== model status ==='
              docker compose exec -T openclaw-gateway sh -lc 'openclaw models status --agent gabriel 2>/dev/null || openclaw models status 2>/dev/null || true' || true
              echo
              echo '=== host access probe ==='
              docker compose exec -T openclaw-gateway sh -lc 'id; echo "PATH=$PATH"; ls -l /var/run/docker.sock /opt/host-tools 2>/dev/null || true; command -v docker || true; docker version --format "{{.Client.Version}} -> {{.Server.Version}}" 2>/dev/null || true; docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" 2>/dev/null || true; test -d /host && ls -la /host | head -n 40 || true' || true
              echo
              echo '=== workspace/session files ==='
              docker compose exec -T openclaw-gateway sh -lc 'pwd; id; find /home/node/.openclaw -maxdepth 6 -type f | sort | tail -n 160' || true
              ;;
            trace-session)
              echo '=== compose ps ==='
              docker compose ps
              echo
              echo '=== channel status ==='
              docker compose exec -T openclaw-gateway sh -lc 'openclaw channels status 2>/dev/null || true'
              echo
              echo '=== sessions ==='
              docker compose exec -T openclaw-gateway sh -lc 'openclaw sessions list 2>/dev/null || true'
              echo
              echo '=== routing schema excerpts ==='
              docker compose exec -T openclaw-gateway sh -lc 'openclaw config schema 2>/dev/null | sed -n "20880,21280p"; echo "----"; openclaw config schema 2>/dev/null | sed -n "22480,23080p"; echo "----"; openclaw config schema 2>/dev/null | sed -n "38260,39240p"' || true
              echo
              echo '=== telegram ingress files ==='
              docker compose exec -T openclaw-gateway sh -lc 'find /home/node/.openclaw/telegram -maxdepth 5 -type f -printf "%TY-%Tm-%Td %TH:%TM:%TS %p\n" 2>/dev/null | sort | tail -n 80 || true'
              echo
              echo '=== latest session content ==='
              docker compose exec -T openclaw-gateway sh -lc '
                session_dir=/home/node/.openclaw/agents/gabriel/sessions
                echo "--- session files"
                find "$session_dir" -maxdepth 1 -type f -printf "%TY-%Tm-%Td %TH:%TM:%TS %f\n" 2>/dev/null | sort | tail -n 30
                latest=$(find "$session_dir" -maxdepth 1 -type f -name "*.jsonl" ! -name "*.trajectory.jsonl" -printf "%T@ %p\n" 2>/dev/null | sort -n | tail -n 1 | cut -d" " -f2-)
                if [ -n "$latest" ] && [ -f "$latest" ]; then
                  echo "--- $latest"
                  node - "$latest" <<'"'"'NODE'"'"'
          const fs = require("fs");
          const file = process.argv[2];
          const secret = /token|apiKey|secret|password|authorization|botToken/i;
          const redact = (value) => JSON.stringify(value, (key, val) => secret.test(key) ? "***REDACTED***" : val);
          const lines = fs.readFileSync(file, "utf8").trim().split(/\n/).filter(Boolean);
          const pick = (obj, paths) => {
            const found = [];
            for (const path of paths) {
              const keys = path.split(".");
              let value = obj;
              for (const key of keys) {
                if (!value || typeof value !== "object" || !(key in value)) {
                  value = undefined;
                  break;
                }
                value = value[key];
              }
              if (value !== undefined && value !== null && value !== "") {
                const text = typeof value === "string" ? value : redact(value);
                found.push(`${path}=${text.replace(/\s+/g, " ").slice(0, 1200)}`);
              }
            }
            return found;
          };
          for (const line of lines.slice(-220)) {
            let item;
            try {
              item = JSON.parse(line);
            } catch {
              console.log(`! unparsed ${line.slice(0, 240)}`);
              continue;
            }
            const type = item.type || item.event || item.name || item.kind || "entry";
            const ts = item.timestamp || item.time || item.createdAt || "";
            const role = item.role || item.message?.role || item.delta?.role || item.data?.role || "";
            const status = item.status || item.stopReason || item.error?.message || item.message?.stopReason || "";
            const parts = pick(item, [
              "message.content.type",
              "message.content.name",
              "message.content.toolName",
              "message.content.input",
              "message.content.arguments",
              "message.content.command",
              "message.content.result",
              "message.content.output",
              "message.content.stdout",
              "message.content.stderr",
              "message.content.exitCode",
              "toolName",
              "toolCall.name",
              "toolCall.input",
              "toolCall.arguments",
              "toolResult.content",
              "toolResult.result",
              "toolResult.output",
              "toolResult.stdout",
              "toolResult.stderr",
              "toolResult.exitCode"
            ]);
            const visit = (value, path = "") => {
              if (!value || parts.length >= 18) return;
              if (typeof value === "string") {
                const text = value.replace(/\s+/g, " ").trim();
                if (
                  text &&
                  text.length > 2 &&
                  !path.toLowerCase().includes("system") &&
                  !/You are|AGENTS\.md|Global Agents Reference|OpenClaw config schema/.test(text)
                ) {
                  parts.push(`${path || "text"}=${text.slice(0, 360)}`);
                }
                return;
              }
              if (Array.isArray(value)) {
                for (const entry of value.slice(0, 12)) visit(entry, path);
                return;
              }
              if (typeof value === "object") {
                for (const [key, val] of Object.entries(value)) {
                  if (secret.test(key)) continue;
                  if (/systemPrompt|toolSchemas|projectContext|nonProjectContext|schema/i.test(key)) continue;
                  visit(val, path ? `${path}.${key}` : key);
                }
              }
            };
            visit(item);
            const interesting = /dime los contenedores|unsupported|telegram|docker ps|sendMessage|tool|error|assistant|user/i.test(
              `${type} ${role} ${status} ${parts.join(" ")}`
            );
            if (interesting) {
              console.log([ts, type, role, status].filter(Boolean).join(" | "));
              if (parts.length) console.log(`  ${parts.join("\n  ")}`);
              if (!parts.length) console.log(`  ${redact(item).slice(0, 900)}`);
            }
          }
          NODE
                fi
                traj=$(find "$session_dir" -maxdepth 1 -type f -name "*.trajectory.jsonl" -printf "%T@ %p\n" 2>/dev/null | sort -n | tail -n 1 | cut -d" " -f2-)
                if [ -n "$traj" ] && [ -f "$traj" ]; then
                  echo "--- latest trajectory compact: $traj"
                  node - "$traj" <<'"'"'NODE'"'"'
          const fs = require("fs");
          const file = process.argv[2];
          const secret = /token|apiKey|secret|password|authorization|botToken/i;
          const lines = fs.readFileSync(file, "utf8").trim().split(/\n/).filter(Boolean).slice(-500);
          for (const line of lines) {
            let item;
            try {
              item = JSON.parse(line);
            } catch {
              if (/unsupported|telegram|sendMessage|docker|error|exception|failed/i.test(line)) console.log(line.slice(0, 700));
              continue;
            }
            const compact = JSON.stringify(item, (key, val) => {
              if (secret.test(key)) return "***REDACTED***";
              if (/systemPrompt|toolSchemas|projectContext|nonProjectContext|schema/i.test(key)) return undefined;
              if (typeof val === "string" && val.length > 500) return `${val.slice(0, 500)}...`;
              return val;
            });
            if (/unsupported|telegram|sendMessage|docker|runtime\.error|error|exception|failed|tool|exec|stopReason/i.test(compact)) {
              console.log(compact.slice(0, 1200));
            }
          }
          NODE
                fi
              ' || true
              echo
              echo '=== recent process logs ==='
              docker compose exec -T openclaw-gateway sh -lc 'for f in /tmp/openclaw/openclaw*.log; do [ -f "$f" ] && tail -n 180 "$f"; done' || true
              ;;
            repair-session)
              stamp="$(date +%Y%m%d-%H%M%S)"
              backup_dir="backups/session-repair-$stamp"
              mkdir -p "$backup_dir"
              echo "Backing up current Gabriel session state to $backup_dir"
              docker compose stop openclaw-gateway
              docker compose run --rm --no-deps --entrypoint sh openclaw-gateway -lc "
                set -eu
                mkdir -p '/backups/session-repair-$stamp'
                if [ -d /home/node/.openclaw/agents/gabriel/sessions ]; then
                  tar -C /home/node/.openclaw/agents/gabriel -czf '/backups/session-repair-$stamp/gabriel-sessions.tgz' sessions || true
                  rm -rf /home/node/.openclaw/agents/gabriel/sessions
                fi
                if [ -f /home/node/.openclaw/openclaw.generated.json ]; then
                  cp -a /home/node/.openclaw/openclaw.generated.json '/backups/session-repair-$stamp/openclaw.generated.json' || true
                  rm -f /home/node/.openclaw/openclaw.generated.json
                fi
                mkdir -p /home/node/.openclaw/agents/gabriel/sessions
                chown -R node:node /home/node/.openclaw/agents/gabriel/sessions || true
              "
              docker compose up -d openclaw-gateway
              sleep 10
              docker compose ps
              docker compose logs --tail=160 openclaw-gateway
              ;;
            restart)
              docker compose restart openclaw-gateway
              sleep 8
              docker compose ps
              docker compose logs --tail=120 openclaw-gateway
              ;;
            ps)
              docker compose ps
              ;;
            schema)
              echo '=== schema paths for Telegram/message rendering ==='
              docker compose exec -T openclaw-gateway sh -lc 'openclaw config schema 2>/dev/null | node -e '"'"'
                const fs = require("fs");
                const schema = JSON.parse(fs.readFileSync(0, "utf8"));
                const needles = /markdown|rich|plain|parse|format|delivery|send|message/i;
                const interestingPath = /(^|\.)(messages|channels\.telegram|channels\.telegram\.accounts|tools\.codeMode)(\.|$)/i;
                const seen = new Set();
                function slim(value) {
                  if (!value || typeof value !== "object") return value;
                  const out = {};
                  for (const key of ["type", "title", "description", "default", "enum", "const", "additionalProperties"]) {
                    if (Object.prototype.hasOwnProperty.call(value, key)) out[key] = value[key];
                  }
                  if (value.anyOf) out.anyOf = value.anyOf.map(slim);
                  if (value.properties) out.properties = Object.keys(value.properties);
                  return out;
                }
                function walk(node, path = "") {
                  if (!node || typeof node !== "object") return;
                  const haystack = `${path} ${node.title || ""} ${node.description || ""}`;
                  if (interestingPath.test(path) && needles.test(haystack) && !seen.has(path)) {
                    seen.add(path);
                    console.log(`--- ${path || "<root>"}`);
                    console.log(JSON.stringify(slim(node), null, 2));
                  }
                  for (const [key, child] of Object.entries(node.properties || {})) {
                    walk(child, path ? `${path}.${key}` : key);
                  }
                  for (const [index, child] of (node.anyOf || []).entries()) {
                    walk(child, `${path}.anyOf[${index}]`);
                  }
                }
                walk(schema);
              '"'"'' || true
              ;;
            cli-help)
              echo '=== openclaw cli help ==='
              docker compose exec -T openclaw-gateway sh -lc '
                for cmd in \
                  "openclaw --help" \
                  "openclaw agents --help" \
                  "openclaw agent --help" \
                  "openclaw run --help" \
                  "openclaw ask --help" \
                  "openclaw chat --help" \
                  "openclaw sessions --help" \
                  "openclaw tools --help"
                do
                  echo "--- $cmd"
                  sh -lc "$cmd" 2>&1 | head -n 120 || true
                done
              ' || true
              ;;
            agent-test)
              echo '=== direct docker stats baseline ==='
              docker compose exec -T openclaw-gateway sh -lc 'docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" | head -n 20'
              echo
              echo '=== OpenClaw agent VPS status test ==='
              docker compose exec -T openclaw-gateway sh -lc '
                set -eu
                out=$(openclaw agent \
                  --agent gabriel \
                  --session-key agent:gabriel:selftest-vps-status \
                  --message "Dime cpu y memoria de los contenedores activos en una frase" \
                  --thinking off \
                  --timeout 300 \
                  --json 2>&1)
                printf "%s\n" "$out"
                if printf "%s\n" "$out" | grep -Eiq "no puedo acceder|no tengo acceso|ejecuta en tu vps|emparej"; then
                  echo "Agent self-test failed: assistant still claims it cannot access the VPS."
                  exit 1
                fi
                if ! printf "%s\n" "$out" | grep -Eiq "cpu|mem|contenedor|container|%|MiB|GiB"; then
                  echo "Agent self-test failed: reply does not look like container CPU/memory status."
                  exit 1
                fi
              '
              echo
              echo '=== self-test session trace ==='
              docker compose exec -T openclaw-gateway sh -lc '
                session_dir=/home/node/.openclaw/agents/gabriel/sessions
                latest=$(find "$session_dir" -maxdepth 1 -type f -name "*.jsonl" ! -name "*.trajectory.jsonl" -printf "%T@ %p\n" 2>/dev/null | sort -n | tail -n 1 | cut -d" " -f2-)
                [ -n "$latest" ] && [ -f "$latest" ] && tail -n 80 "$latest"
              ' || true
              ;;
            agent-main-test)
              echo '=== workspace identity ==='
              docker compose exec -T openclaw-gateway sh -lc 'sed -n "1,80p" /home/node/.openclaw/workspace/IDENTITY.md || true'
              echo
              echo '=== direct docker stats baseline ==='
              docker compose exec -T openclaw-gateway sh -lc 'docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" | head -n 20'
              echo
              echo '=== OpenClaw main session VPS status test ==='
              docker compose exec -T openclaw-gateway sh -lc '
                set -eu
                out=$(openclaw agent \
                  --agent gabriel \
                  --session-key agent:gabriel:main \
                  --message "Dime cpu y memoria de los contenedores activos en una frase" \
                  --thinking off \
                  --timeout 300 \
                  --json 2>&1)
                printf "%s\n" "$out"
                if printf "%s\n" "$out" | grep -Eiq "no puedo acceder|no tengo acceso|ejecuta en tu vps|emparej"; then
                  echo "Main-session test failed: assistant still claims it cannot access the VPS."
                  exit 1
                fi
                if ! printf "%s\n" "$out" | grep -Eiq "cpu|mem|contenedor|container|%|MiB|GiB"; then
                  echo "Main-session test failed: reply does not look like container CPU/memory status."
                  exit 1
                fi
                session_dir=/home/node/.openclaw/agents/gabriel/sessions
                latest=$(find "$session_dir" -maxdepth 1 -type f -name "*.jsonl" ! -name "*.trajectory.jsonl" -printf "%T@ %p\n" 2>/dev/null | sort -n | tail -n 1 | cut -d" " -f2-)
                if [ -z "$latest" ] || [ ! -f "$latest" ]; then
                  echo "Main-session test failed: session file was not written."
                  exit 1
                fi
                echo
                echo "--- main session tail"
                tail -n 120 "$latest"
                if ! tail -n 160 "$latest" | grep -Fq "docker stats --no-stream"; then
                  echo "Main-session test failed: no docker stats exec call was recorded."
                  exit 1
                fi
              '
              ;;
            *)
              echo "Unknown action: $ops_action"
              exit 1
              ;;
          esac
          REMOTE
