name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    name: Verify OpenClaw wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          docker compose -f docker-compose.prod.yml config

      - name: Check repository has no Python bot runtime
        run: |
          test ! -d assistant
          test ! -f bot.py
          test ! -f requirements.txt
          test ! -f Dockerfile

      - name: Check tracked files for obvious secrets
        run: |
          ! git grep -I -n -E 'sk-ant-[A-Za-z0-9_-]{20,}|\b[0-9]{8,12}:[A-Za-z0-9_-]{30,}\b|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}' \
            -- . ':!README.md'
