services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true
    command:
      - sh
      - -lc
      - |
        node /opt/openclaw-patches/patch-telegram-plain-send.mjs
        exec node /app/openclaw.mjs gateway
    env_file:
      - .env
    environment:
      HOME: /home/node
      NODE_ENV: production
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_CLI_PLUGIN_EXTRA_DIRS: /opt/host-tools/cli-plugins
      HOST_ROOT: /host
      PATH: /opt/host-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    user: "0:0"
    privileged: true
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ./auth:/home/node/.config/openclaw
      - ./backups:/backups
      - ./openclaw-patches:/opt/openclaw-patches:ro
      - ./tools:/opt/host-tools:ro
      - ./tools/docker:/usr/local/bin/docker:ro
      - ./tools/docker-compose:/usr/local/bin/docker-compose:ro
      - ./tools/cli-plugins:/usr/local/lib/docker/cli-plugins:ro
      - /:/host
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18789/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
